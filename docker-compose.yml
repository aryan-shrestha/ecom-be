version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecom_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecom_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecom_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecom_api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ecom_auth
      UV_PROJECT_ENVIRONMENT: /opt/venv
      WATCHFILES_FORCE_POLLING: "true"
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - uv_venv:/opt/venv
      - ./keys:/app/keys
    command: ["sh", "/app/docker/dev-start.sh"]

volumes:
  postgres_data:
  uv_venv:
